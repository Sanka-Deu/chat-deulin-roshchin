<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

    <title>Чат</title>
    <link rel="stylesheet" type="text/css" href="../static/css/style.css">
</head>
</head>
<body>

<div class="register-card">
  <h1>Регистрация</h1>

  <form id="registerForm" action="/user_registration" method="post">
    <!-- Логин -->
    <div class="field-group">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" placeholder="ivanov2024" autocomplete="username" required>
    </div>

    <!-- Пароль -->
    <div class="field-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required>
    </div>

    <!-- Имя -->
    <div class="field-group">
      <label for="firstName">Имя</label>
      <input type="text" id="firstName" name="first_name" placeholder="Иван" autocomplete="given-name" required>
    </div>

    <!-- Фамилия -->
    <div class="field-group">
      <label for="lastName">Фамилия</label>
      <input type="text" id="lastName" name="last_name" placeholder="Иванов" autocomplete="family-name" required>
    </div>

    <button type="submit">Зарегистрироваться</button>
    <div id="formStatus" class="status-message"></div>
  </form>
</div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="../static/js/script.js"></script>
</html>
